<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Detector</title>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --container-bg: #ffffff;
            --primary: #2196F3;
            --primary-hover: #1976D2;
            --human-color: #388e3c;
            --ai-color: #d32f2f;
            --text-main: #333;
            --text-muted: #777;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: var(--text-main);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .toolbar button {
            background: #e0e0e0;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .toolbar button:hover {
            background: #d5d5d5;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 15px;
            cursor: pointer;
        }

        .checkbox-container input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .analyze-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .analyze-btn:hover {
            background-color: var(--primary-hover);
        }

        /* Results section */
        .results-card {
            margin-top: 25px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            background-color: #fafafa;
            text-align: center;
            display: none; /* Скрыто до проверки */
        }

        .progress-bar-bg {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--human-color);
            width: 0%;
            transition: width 0.5s ease-in-out, background-color 0.5s;
        }

        .verdict {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0 5px 0;
        }

        .model-attribution {
            font-size: 16px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }

        .metrics {
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Детектор текста (ИИ / Человек)</h1>
    
    <div class="toolbar">
        <button onclick="pasteText()">📋 Вставить из буфера</button>
        <button onclick="clearText()">🗑️ Очистить</button>
    </div>

    <textarea id="textInput" placeholder="Вставьте текст для анализа..."></textarea>

    <label class="checkbox-container">
        <input type="checkbox" id="attributionCheck">
        Определить вероятную модель ИИ
    </label>

    <button class="analyze-btn" onclick="analyzeText()">Проверить текст</button>

    <div class="results-card" id="resultsCard">
        <div id="probLabel">Вероятность генерации ИИ: 0%</div>
        
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>

        <div class="verdict" id="verdictLabel">Похоже на: ...</div>
        <div class="model-attribution" id="modelLabel">🤖 Вероятная модель: GPT-4</div>
        
        <div class="metrics" id="metricsLabel">
            Метрики модели -> F1: -- | ROC-AUC: --
        </div>
    </div>
</div>

<script>
    async function pasteText() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('textInput').value = text;
        } catch (err) {
            alert('Не удалось прочитать буфер обмена. Пожалуйста, используйте Ctrl+V');
        }
    }

    function clearText() {
        document.getElementById('textInput').value = '';
        document.getElementById('resultsCard').style.display = 'none';
    }

    function analyzeText() {
        const text = document.getElementById('textInput').value.trim();
        if (!text) {
            alert('Пожалуйста, введите текст для проверки.');
            return;
        }

        //Показываем карточку с результатами
        const resultsCard = document.getElementById('resultsCard');
        resultsCard.style.display = 'block';

        //Симуляция ответа от ML
        const aiProb = Math.random() * 100;
        const wantsAttribution = document.getElementById('attributionCheck').checked;
        
        //Обновление UI
        const progressBar = document.getElementById('progressBar');
        const verdictLabel = document.getElementById('verdictLabel');
        const modelLabel = document.getElementById('modelLabel');
        
        document.getElementById('probLabel').innerText = `Вероятность генерации ИИ: ${aiProb.toFixed(1)}%`;
        progressBar.style.width = `${aiProb}%`;

        //Логика бинарной классификации
        if (aiProb >= 50.0) {
            progressBar.style.backgroundColor = 'var(--ai-color)';
            verdictLabel.innerHTML = 'Похоже на: <span style="color: var(--ai-color)">ИИ</span>';
            
            // Логика атрибуции модели
            if (wantsAttribution) {
                const models = ["ChatGPT (GPT-4)", "Claude 3 Opus", "YandexGPT", "GigaChat", "Llama 3"];
                const randomModel = models[Math.floor(Math.random() * models.length)];
                modelLabel.innerText = ` Вероятная модель: ${randomModel}`;
                modelLabel.style.display = 'block';
            } else {
                modelLabel.style.display = 'none';
            }
        } else {
            progressBar.style.backgroundColor = 'var(--human-color)';
            verdictLabel.innerHTML = 'Похоже на: <span style="color: var(--human-color)">человека</span>';
            modelLabel.style.display = 'none';
        }

        //Обновление метрик
        const f1 = (0.8 + Math.random() * 0.19).toFixed(2);
        const rocAuc = (0.85 + Math.random() * 0.14).toFixed(2);
        document.getElementById('metricsLabel').innerText = `Показатели (на валидации) -> F1: ${f1} | ROC-AUC: ${rocAuc}`;
    }
</script>

</body>
</html>
